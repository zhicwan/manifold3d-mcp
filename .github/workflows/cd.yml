name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test

      - run: npm publish

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
